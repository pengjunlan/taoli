{% extends 'base/layout.html' %}

{% block content %}
<div class="shell-container page-stack">
    <section class="page-header">
        <div>
            <div class="eyebrow">Spread Arbitrage</div>
            <h1>{{ page_title }}</h1>
            <p>{{ page_subtitle }}</p>
        </div>
    </section>

    <section class="card card--section">
        <div class="card__header card__header--row">
            <div>
                <h2>跨所价差机会列表</h2>
                <p>这里展示的是监控引擎筛出的跨所候选机会，真正是否执行由自动策略参数统一控制。</p>
            </div>
            <div class="section-tools">
                <div class="inline-note" data-spread-count>加载中...</div>
            </div>
        </div>

        <div class="table-wrap">
            <table id="spread-table" class="data-table" data-pagination-items="tbody tr" data-page-size="5">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>类型</th>
                        <th>币种</th>
                        <th>套利组合</th>
                        <th>收益指标</th>
                        <th>核心指标</th>
                        <th>交易手续费</th>
                        <th>持仓数量</th>
                        <th>持仓均价</th>
                        <th>持仓市值</th>
                        <th>关键字段</th>
                    </tr>
                </thead>
                <tbody data-spread-table-body>
                    <tr class="table-empty-row">
                        <td colspan="11">
                            <div class="table-empty-state">
                                <div class="table-empty-state__icon" aria-hidden="true"></div>
                                <div class="table-empty-state__title">加载中...</div>
                                <p class="table-empty-state__text">正在获取最新价差机会数据。</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
{% endblock %}
