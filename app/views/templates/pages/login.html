{% extends 'base/layout.html' %}

{% block content %}
<section class="login-page">
    <div class="login-page__backdrop"></div>
    <div class="login-shell">
        <div class="login-card card">
            <div class="card__header">
                <div class="eyebrow">ArbiMatrix</div>
                <h1>{{ page_title }}</h1>
                <p>{{ page_subtitle }}</p>
            </div>

            <div class="login-card__intro">
                <h2>账号登录</h2>
            </div>

            <form id="login-form" class="form-stack">
                <label class="field">
                    <span class="field__label">账号</span>
                    <input class="field__control" type="text" placeholder="请输入账号">
                </label>

                <label class="field">
                    <span class="field__label">密码</span>
                    <input class="field__control" type="password" placeholder="请输入密码">
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" checked>
                    <span>记住登录状态</span>
                </label>

                <button class="button button--primary button--block" type="submit">进入系统</button>
            </form>

            <div class="login-card__footer">
                <span>没有账号？</span>
                <a class="button button--ghost" href="/register">注册</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
