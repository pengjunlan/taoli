{% extends 'base/layout.html' %}

{% block content %}
<div class="shell-container page-stack">
    <section class="page-header">
        <div>
            <div class="eyebrow">Fee Arbitrage</div>
            <h1>{{ page_title }}</h1>
            <p>{{ page_subtitle }}</p>
        </div>
    </section>

    <section class="card card--section">
        <div class="card__header card__header--row">
            <div>
                <h2>资金费机会列表</h2>
                <p>这里展示的是扫描引擎筛出的候选机会。页面会先加载最近一次成功结果，实时行情恢复后自动切到最新数据。</p>
            </div>
            <div class="section-tools">
                <div class="inline-note" data-funding-count>加载中...</div>
            </div>
        </div>
        <div class="runtime-banner" data-runtime-banner hidden>
            <span class="pill pill--neutral" data-runtime-banner-pill>预热中</span>
            <div class="runtime-banner__text">
                <strong data-runtime-banner-label>正在初始化资金费机会链路</strong>
                <span data-runtime-banner-message>页面会优先展示最近一次成功快照，实时行情恢复后自动切换。</span>
            </div>
            <div class="runtime-banner__meta" data-runtime-banner-meta>--</div>
        </div>

        <div class="table-wrap">
            <table id="funding-table" class="data-table" data-pagination-items="tbody tr" data-page-size="5">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>类型</th>
                        <th>币种</th>
                        <th>套利组合</th>
                        <th>收益指标</th>
                        <th>核心指标</th>
                        <th>补充指标</th>
                        <th>交易手续费</th>
                        <th>持仓数量</th>
                        <th>当前价格</th>
                        <th>持仓市值</th>
                        <th>关键字段</th>
                    </tr>
                </thead>
                <tbody data-funding-table-body>
                    <tr class="table-empty-row">
                        <td colspan="12" class="spread-metric">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div data-funding-pagination></div>
    </section>
</div>
{% endblock %}
