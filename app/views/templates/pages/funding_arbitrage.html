{% extends 'base/layout.html' %}

{% block content %}
<div class="shell-container page-stack">
    <section class="page-header">
        <div>
            <div class="eyebrow">Fee Arbitrage</div>
            <h1>{{ page_title }}</h1>
            <p>{{ page_subtitle }}</p>
        </div>
    </section>

    <section class="card card--section">
        <div class="card__header card__header--row">
            <div>
                <h2>资费差机会列表</h2>
                <p>这里展示的是扫描引擎筛出的候选机会，命中你的自动规则后即可直接进入执行队列。</p>
            </div>
            <div class="section-tools">
                <div class="inline-note" data-funding-count>加载中...</div>
            </div>
        </div>

        <div class="table-wrap">
            <table id="funding-table" class="data-table" data-pagination-items="tbody tr" data-page-size="5">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>类型</th>
                        <th>币种</th>
                        <th>套利组合</th>
                        <th>收益指标</th>
                        <th>核心指标</th>
                        <th>补充指标</th>
                        <th>交易手续费</th>
                        <th>持仓数量</th>
                        <th>持仓均价</th>
                        <th>持仓市值</th>
                        <th>关键字段</th>
                    </tr>
                </thead>
                <tbody data-funding-table-body>
                    <tr class="table-empty-row">
                        <td colspan="12" class="spread-metric">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
{% endblock %}
