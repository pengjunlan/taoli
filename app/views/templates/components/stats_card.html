<article class="stats-card stats-card--{{ card.tone | default('neutral') }}" {% if card.key %}data-summary-card="{{ card.key }}"{% endif %}>
    <div class="stats-card__label" data-summary-label>{{ card.label }}</div>
    <div class="stats-card__value" data-summary-value>{{ card.value }}</div>
    <div class="stats-card__change" data-summary-change>{{ card.change }}</div>
</article>
