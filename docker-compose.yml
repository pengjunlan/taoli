version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: taoli-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: taoli-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taoli-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ARBI_MYSQL_HOST: mysql
      ARBI_MYSQL_PORT: 3306
      ARBI_MYSQL_USER: root
      ARBI_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ARBI_MYSQL_DATABASE: ${MYSQL_DATABASE}
      ARBI_MYSQL_CHARSET: utf8mb4
      ARBI_MYSQL_POOL_NAME: arbitrage_system_pool
      ARBI_MYSQL_POOL_SIZE: 10
      ARBI_MYSQL_CONNECTION_TIMEOUT: 5
      ARBI_REDIS_HOST: redis
      ARBI_REDIS_PORT: 6379
      ARBI_REDIS_PASSWORD: ""
      ARBI_REDIS_DB: 0
      ARBI_REDIS_ENABLED: "true"
      ARBI_REDIS_KEY_PREFIX: "arbitrage_system:auth:session:"
      ARBI_REDIS_SOCKET_TIMEOUT: 2
      ARBI_SESSION_COOKIE_NAME: arbi_session
      ARBI_SESSION_TTL_SECONDS: 43200
      ARBI_REMEMBER_ME_TTL_SECONDS: 2592000
      ARBI_PBKDF2_ITERATIONS: 200000
      ARBI_MIN_USERNAME_LENGTH: 4
      ARBI_MAX_USERNAME_LENGTH: 32
      ARBI_MIN_PASSWORD_LENGTH: 8
      ARBI_SECURE_COOKIE: "false"
      ARBI_SAME_SITE: lax
    ports:
      - "80:8000"

volumes:
  mysql_data:
  redis_data:
